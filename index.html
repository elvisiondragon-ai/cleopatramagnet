<!doctype html>

    <!-- iOS Safari hard cache-bust — ONLY change APP_VERSION here when deploying -->
    <script>
      (function() {
        var V = '1.0.16';
        window.__APP_VERSION__ = V;
        var url = new URL(window.location.href);
        if (url.searchParams.get('v') !== V) {
          url.searchParams.set('v', V);
          window.location.replace(url.toString());
        } else {
          url.searchParams.delete('v');
          history.replaceState(null, '', url.pathname + (url.search === '?' ? '' : url.search) + url.hash);
        }
      })();
    </script>

    <!-- Console Log Suppression (Executed before other scripts) -->
    <script>
      (function() {
        var originalLog = console.log;
        var originalWarn = console.warn;
        var originalInfo = console.info;
        var originalError = console.error;
        var originalDebug = console.debug;

        var suppressPatterns = [
          'Download the React DevTools',
          '🔗 Supabase connecting to',
          "You are sending a non-standard event 'TimeSpent'",
          'TimeSpent'
        ];

        function shouldSuppress(args) {
          for (var i = 0; i < args.length; i++) {
            var arg = args[i];
            if (typeof arg === 'string') {
              for (var j = 0; j < suppressPatterns.length; j++) {
                if (arg.indexOf(suppressPatterns[j]) !== -1) return true;
              }
            }
          }
          return false;
        }

        console.log = function() {
          if (!shouldSuppress(arguments)) originalLog.apply(console, arguments);
        };
        console.warn = function() {
          if (!shouldSuppress(arguments)) originalWarn.apply(console, arguments);
        };
        console.info = function() {
          if (!shouldSuppress(arguments)) originalInfo.apply(console, arguments);
        };
        console.error = function() {
          if (!shouldSuppress(arguments)) originalError.apply(console, arguments);
        };
        console.debug = function() {
          if (!shouldSuppress(arguments)) originalDebug.apply(console, arguments);
        };
      })();
    </script>
